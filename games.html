<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cython Neon Games - Ultra Smooth</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        :root { 
            --main: #4facfe; --bg: #f8fafc; --app: #ffffff; --text: #1e293b; 
            --card-bg: #ffffff; --cell-bg: #f1f5f9; --border: rgba(0,0,0,0.05);
            --success: #2ecc71; /* الأخضر المطلوب لجولة أخرى */
        }

        /* تنسيق الثيمات */
        html.color-1 { --main: #4facfe; } html.color-2 { --main: #ff6b6b; }
        html.color-3 { --main: #51cf66; } html.color-4 { --main: #a29bfe; }
        html.color-5 { --main: #fab005; } html.color-6 { --main: #ff85a1; }
        html.color-7 { --main: #20c997; } html.color-8 { --main: #5c7cfa; }
        html.color-9 { --main: #a67c52; } html.color-10 { --main: #333333; }
        html.dark { --bg: #020617; --app: #0f172a; --text: #f8fafc; --card-bg: #1e293b; --cell-bg: #334155; --border: rgba(255,255,255,0.03); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; outline: none !important; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; transition: 0.5s; }
        
        /* عزل الوميض وخط الماوس */
        input, button, div, span { caret-color: transparent !important; user-select: none; }

        .phone { 
            width: 360px; height: 740px; background: var(--app); border-radius: 50px; 
            display: flex; flex-direction: column; position: relative; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.45); overflow: hidden; border: 10px solid #1e293b;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .header { height: 100px; padding: 50px 20px 10px; background: var(--main); color: #fff; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.15); transition: 0.3s; }
        .back-link { position: absolute; right: 25px; color: #fff; text-decoration: none; font-size: 24px; }
        .header h1 { font-size: 22px; font-weight: 900; letter-spacing: 1px; }

        .games-list { padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; flex: 1; scrollbar-width: none; }
        .game-card { 
            background: var(--card-bg); padding: 18px; border-radius: 25px; display: flex; align-items: center; gap: 15px; 
            cursor: pointer; border: 1px solid var(--border); transition: 0.3s;
            animation: slideUp 0.6s ease forwards; opacity: 0;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .game-card:active { transform: scale(0.95); }
        .game-card i { font-size: 28px; color: var(--main); text-shadow: 0 0 10px var(--main); }
        .game-card h3 { font-size: 16px; margin-bottom: 2px; }
        .game-card p { font-size: 11px; opacity: 0.7; }

        #gameStage { display: none; flex: 1; flex-direction: column; align-items: center; padding: 20px; width: 100%; animation: fadeIn 0.4s; }
        
        .cell { 
            width: 85px; height: 85px; background: var(--cell-bg); border-radius: 20px; 
            border: none; display: flex; align-items: center; justify-content: center; 
            font-size: 38px; font-weight: 900; color: var(--text); cursor: pointer;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .cell:active { transform: scale(0.85); }

        .score-card { flex: 1; background: var(--card-bg); padding: 12px; border-radius: 20px; text-align: center; border: 2px solid transparent; transition: 0.4s; }
        .score-card.active { border-color: var(--main); box-shadow: 0 0 15px var(--main); transform: translateY(-3px); }

        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.96); z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; backdrop-filter: blur(15px); }
        #overlay.active { display: flex; }

        /* الأزرار النهائية */
        .btn-retry { background: var(--success) !important; color: white; border: none; padding: 18px 45px; border-radius: 22px; font-weight: 900; cursor: pointer; margin: 10px; width: 250px; transition: 0.3s; box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }
        .btn-exit { background: #ff4757; color: white; border: none; padding: 18px 45px; border-radius: 22px; font-weight: 900; cursor: pointer; margin: 10px; width: 250px; transition: 0.3s; }
        .btn-retry:active, .btn-exit:active { transform: scale(0.95); }

        canvas { border-radius: 35px; border: 5px solid var(--main); background: #000; box-shadow: 0 0 25px var(--main); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="phone">
    <div id="overlay">
        <div id="resView" style="text-align: center; display:none;">
            <div id="resIcon" style="font-size: 90px; text-shadow: 0 0 20px var(--main);">🏆</div>
            <h2 id="resMsg" style="margin: 20px 0; font-size: 26px;"></h2>
            <button id="btnRetry" class="btn-retry">جولة أخرى</button>
            <button class="btn-exit" onclick="location.reload()">القائمة الرئيسية</button>
        </div>
        <div id="countView"><h1 style="font-size: 120px; color: var(--main); text-shadow: 0 0 20px var(--main);" id="countNum">3</h1></div>
    </div>

    <div class="header">
        <a href="index.html" class="back-link"><i class="fas fa-chevron-right"></i></a>
        <h1>سايثون غيمز</h1>
    </div>

    <div class="games-list" id="menu">
        <div class="game-card" style="animation-delay:0.1s" onclick="startFlow('xo2')"><i class="fas fa-user-friends"></i><div><h3>XO لاعبين</h3><p>تحدي ميني بتأثير نيون ناعم.</p></div></div>
        <div class="game-card" style="animation-delay:0.2s" onclick="startFlow('xo')"><i class="fas fa-robot"></i><div><h3>XO ذكية</h3><p>تحدى محرك سايثون الذكي.</p></div></div>
        <div class="game-card" style="animation-delay:0.3s" onclick="startFlow('mem')"><i class="fas fa-brain"></i><div><h3>قوة الذاكرة</h3><p>طابق الرموز واختبر تركيزك.</p></div></div>
        <div class="game-card" style="animation-delay:0.4s" onclick="startFlow('dodge')"><i class="fas fa-rocket"></i><div><h3>الهروب</h3><p>تجنب العقبات! الأفضل: <span id="t-d">0</span></p></div></div>
        <div class="game-card" style="animation-delay:0.5s" onclick="startFlow('tap')"><i class="fas fa-bolt"></i><div><h3>النقر السريع</h3><p>سرعة الأصابع! الأفضل: <span id="t-t">0</span></p></div></div>
        <div class="game-card" style="animation-delay:0.6s" onclick="startFlow('math')"><i class="fas fa-calculator"></i><div><h3>تحدي الحساب</h3><p>مسائل رياضية سريعة البرق.</p></div></div>
    </div>

    <div id="gameStage">
        <div id="gameContent" style="width:100%; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;"></div>
        <button class="btn-exit" style="width:140px; padding:10px; font-size:13px; margin-top:15px;" onclick="location.reload()">خروج</button>
    </div>
</div>

<script>
    let s1 = 0, s2 = 0, gameLoop = null, currentKey = '';

    function sync() {
        const m = localStorage.getItem('themeMode'), c = localStorage.getItem('themeColor');
        document.documentElement.className = (m === 'dark' ? 'dark ' : '') + (c || '');
        window.activeC = getComputedStyle(document.documentElement).getPropertyValue('--main').trim();
        document.getElementById('t-d').innerText = localStorage.getItem('top_dodge') || 0;
        document.getElementById('t-t').innerText = localStorage.getItem('top_tap') || 0;
    }
    sync();

    function startFlow(key) {
        currentKey = key;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('overlay').classList.add('active');
        document.getElementById('resView').style.display = 'none';
        document.getElementById('countView').style.display = 'block';
        let c = 3; document.getElementById('countNum').innerText = c;
        let itv = setInterval(() => {
            c--; if(c > 0) document.getElementById('countNum').innerText = c;
            else { clearInterval(itv); document.getElementById('overlay').classList.remove('active'); document.getElementById('gameStage').style.display='flex'; loadGame(key); }
        }, 400);
    }

    function showEnd(msg, icon="🏆", storeKey=null, score=0) {
        clearInterval(gameLoop); clearInterval(window.tItv);
        if(storeKey) {
            let best = localStorage.getItem(storeKey) || 0;
            if(score > best) localStorage.setItem(storeKey, score);
        }
        document.getElementById('overlay').classList.add('active');
        document.getElementById('resView').style.display = 'block';
        document.getElementById('countView').style.display = 'none';
        document.getElementById('resIcon').innerText = icon;
        document.getElementById('resMsg').innerText = msg;
        document.getElementById('btnRetry').onclick = () => { document.getElementById('overlay').classList.remove('active'); loadGame(currentKey); };
    }

    function loadGame(key) {
        const content = document.getElementById('gameContent');
        content.innerHTML = '';
        if(key === 'xo2') initXO2();
        else if(key === 'xo') initXO();
        else if(key === 'mem') initMem();
        else if(key === 'dodge') initDodge();
        else if(key === 'tap') initTap();
        else if(key === 'math') initMath();
    }

    // --- XO 2 Players ---
    function initXO2() {
        const content = document.getElementById('gameContent');
        content.innerHTML = `<h3 style="margin-bottom:20px;">اللاعب 1: اختر العلامة</h3>
        <div style="display:flex; gap:20px;"><button class="cell" onclick="setupXO2('X')" style="color:var(--main)">X</button>
        <button class="cell" onclick="setupXO2('O')" style="color:#ff4757">O</button></div>`;
    }
    function setupXO2(p1Mark) {
        const p2Mark = p1Mark === 'X' ? 'O' : 'X';
        let turn = p1Mark, board = Array(9).fill(null);
        const render = () => {
            document.getElementById('gameContent').innerHTML = `
            <div style="display:flex; width:100%; gap:10px; margin-bottom:20px;">
                <div class="score-card ${turn===p1Mark?'active':''}">لاعب 1 (${p1Mark})<br><b>${s1}</b></div>
                <div class="score-card ${turn===p2Mark?'active':''}">لاعب 2 (${p2Mark})<br><b>${s2}</b></div>
            </div>
            <div style="display:grid; grid-template-columns:repeat(3,85px); gap:12px;">
                ${board.map((v,i)=>`<div class="cell" onclick="playXO2(${i})">${v||''}</div>`).join('')}
            </div>`;
            document.querySelectorAll('.cell').forEach(c => {
                if(c.innerText==='X') { c.style.color = 'var(--main)'; c.style.textShadow = '0 0 10px var(--main)'; }
                if(c.innerText==='O') { c.style.color = '#ff4757'; c.style.textShadow = '0 0 10px #ff4757'; }
            });
        };
        window.playXO2 = (i) => {
            if(board[i]) return;
            board[i] = turn;
            if(checkWin(board)) {
                if(turn === p1Mark) s1++; else s2++;
                return showEnd("نصر لـ " + (turn === p1Mark ? "اللاعب 1" : "اللاعب 2"), "🎉");
            }
            if(!board.includes(null)) return showEnd("تعادل!", "🤝");
            turn = (turn === p1Mark ? p2Mark : p1Mark); render();
        };
        render();
    }
    function checkWin(b) {
        const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        return lines.find(l => b[l[0]] && b[l[0]] === b[l[1]] && b[l[0]] === b[l[2]]);
    }

    // --- Dodge ---
    function initDodge() {
        const content = document.getElementById('gameContent');
        content.innerHTML = '<canvas id="dc" width="310" height="340"></canvas><div style="display:flex;gap:20px;margin-top:20px"><button class="cell" style="width:120px; background:var(--main); color:white" onpointerdown="window.mv=-11" onpointerup="window.mv=0">◀</button><button class="cell" style="width:120px; background:var(--main); color:white" onpointerdown="window.mv=11" onpointerup="window.mv=0">▶</button></div>';
        const ctx = document.getElementById('dc').getContext('2d');
        let px = 135, obs = [], score = 0; window.mv = 0;
        gameLoop = setInterval(() => {
            ctx.clearRect(0,0,310,340); px += window.mv; px = Math.max(10, Math.min(260, px));
            ctx.shadowBlur = 15; ctx.shadowColor = window.activeC;
            ctx.fillStyle = window.activeC; ctx.beginPath(); ctx.roundRect(px, 300, 45, 18, 10); ctx.fill();
            if(Math.random() < 0.08) obs.push({x:Math.random()*290+10, y:-20, s: 6 + (score/12)});
            obs.forEach((o,i) => { 
                o.y += o.s; ctx.fillStyle = '#ff4757'; ctx.beginPath(); ctx.arc(o.x, o.y, 11, 0, 7); ctx.fill();
                if(o.y > 300 && o.x > px && o.x < px+45) showEnd("تحطمت!\nالنقاط: " + score, "💥", 'top_dodge', score);
                if(o.y > 350) { obs.splice(i,1); score++; }
            });
            ctx.shadowBlur = 0; ctx.fillStyle = "#fff"; ctx.font = "bold 20px Cairo"; ctx.fillText("Score: " + score, 20, 35);
        }, 1000/60);
    }

    // --- Memory ---
    function initMem() {
        let items = ['💎','💎','🔥','🔥','⚡','⚡','🎮','🎮','🌈','🌈','🚀','🚀'].sort(()=>Math.random()-0.5);
        let flipped = [], matches = 0;
        document.getElementById('gameContent').innerHTML = '<div style="display:grid; grid-template-columns:repeat(3,90px); gap:12px;">' + items.map(v=>`<div class="cell" style="font-size:0px" onclick="fMem(this,'${v}')">?</div>`).join('') + '</div>';
        window.fMem = (el, v) => {
            if(el.style.fontSize !== '0px' || flipped.length === 2) return;
            el.innerText = v; el.style.fontSize = '40px'; el.style.background = 'var(--main)'; el.style.color = 'white'; el.style.boxShadow = '0 0 15px var(--main)';
            flipped.push({el, v});
            if(flipped.length === 2) {
                if(flipped[0].v === flipped[1].v) { matches++; flipped = []; if(matches === 6) showEnd("قوة ذاكرة مذهلة!"); }
                else { setTimeout(() => { flipped.forEach(f => { f.el.innerText = '?'; f.el.style.fontSize = '0px'; f.el.style.background = 'var(--cell-bg)'; f.el.style.boxShadow = 'none'; }); flipped = []; }, 500); }
            }
        }
    }

    // --- Math ---
    function initMath() {
        let a = Math.floor(Math.random()*80+10), b = Math.floor(Math.random()*80+10);
        document.getElementById('gameContent').innerHTML = `<h1 style="font-size:70px; margin-bottom:20px; text-shadow:0 0 10px var(--main)">${a} + ${b}</h1><input type="number" id="ans" style="background:var(--cell-bg); border:4px solid var(--main); width:200px; height:80px; border-radius:20px; text-align:center; font-size:40px; color:var(--text);"><button class="btn-retry" style="margin-top:25px; width:180px;" onclick="checkM(${a+b})">تأكيد</button>`;
    }
    window.checkM = (r) => { if(document.getElementById('ans').value == r) showEnd("أنت عبقري!"); else showEnd("خطأ! الجواب: " + r, "❌"); };

    // --- Tap ---
    function initTap() {
        let s = 0, t = 10;
        document.getElementById('gameContent').innerHTML = `<button class="cell" style="width:160px; height:160px; border-radius:50%; background:var(--main); color:white; box-shadow:0 0 20px var(--main);" onclick="s++; document.getElementById('sv').innerText=s">اضغط!</button><h2 style="margin-top:20px">النقاط: <span id="sv" style="color:var(--main)">0</span></h2><p>الوقت: <span id="tm">10</span></p>`;
        window.tItv = setInterval(() => { t--; document.getElementById('tm').innerText=t; if(t<=0) showEnd("السرعة: " + s, "⚡", 'top_tap', s); }, 1000);
    }

    // --- XO AI ---
    function initXO() {
        let b = Array(9).fill(null);
        document.getElementById('gameContent').innerHTML = '<div style="display:grid; grid-template-columns:repeat(3,85px); gap:12px;">' + Array(9).fill().map((_,i)=>`<div class="cell xbt" onclick="pXO(this,${i})"></div>`).join('') + '</div>';
        window.pXO = (el, i) => {
            if(b[i]) return; b[i]='X'; el.innerText='X'; el.style.color='var(--main)'; el.style.textShadow='0 0 10px var(--main)';
            if(checkWin(b)) return showEnd("هزمت الذكاء!");
            let e = b.map((v,j)=>v===null?j:null).filter(v=>v!==null);
            if(e.length){
                let r = e[Math.floor(Math.random()*e.length)];
                setTimeout(() => { 
                    b[r]='O'; let t = document.querySelectorAll('.xbt')[r];
                    t.innerText='O'; t.style.color='#ff4757'; t.style.textShadow='0 0 10px #ff4757';
                    if(checkWin(b)) showEnd("هزمك البوت!", "🤖");
                }, 300);
            } else if(!checkWin(b)) showEnd("تعادل!", "🤝");
        }
    }
</script>
</body>
</html>
