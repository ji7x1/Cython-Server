<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Cython 2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        (function() {
            const savedColor = localStorage.getItem('themeColor');
            const savedMode = localStorage.getItem('themeMode');
            if (savedColor) document.documentElement.classList.add(savedColor);
            if (savedMode === 'dark') document.documentElement.classList.add('dark');
            const bg = savedMode === 'dark' ? '#111' : '#f4f7f9';
            document.documentElement.style.backgroundColor = bg;
        })();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        :root {
            --main: #4facfe; --bg: #f4f7f9; --app: #ffffff; --p: #555; --input-bg: #f0f8ff;
        }

        html.color-1 { --main: #4facfe; } html.color-2 { --main: #ff6b6b; }
        html.color-3 { --main: #51cf66; } html.color-4 { --main: #a29bfe; }
        html.color-5 { --main: #fab005; } html.color-6 { --main: #ff85a1; }
        html.color-7 { --main: #20c997; } html.color-8 { --main: #5c7cfa; }
        html.color-9 { --main: #a67c52; } html.color-10 { --main: #333333; }

        html.dark { --bg: #111 !important; --app: #222 !important; --p: #bbb !important; --input-bg: #333 !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; outline: none !important; }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
        }

        .phone { 
            width: 350px; height: 700px; background: var(--app); 
            border-radius: 40px; display: flex; flex-direction: column; 
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            position: relative; border: 8px solid #222; 
        }

        .header { padding: 60px 30px 20px; text-align: center; }
        .header h2 { color: var(--main); font-size: 28px; font-weight: 900; }
        .header p { color: var(--p); font-size: 13px; margin-top: 5px; }

        .content { flex: 1; padding: 20px 30px; }

        .input-group { margin-bottom: 15px; text-align: right; }
        .input-group label { display: block; margin-bottom: 5px; color: var(--main); font-weight: bold; font-size: 13px; }
        
        .field {
            width: 100%; padding: 12px 15px; border-radius: 15px;
            border: 2px solid transparent; background: var(--input-bg);
            color: var(--main); font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }
        .field i { color: var(--p); font-size: 14px; }
        .field input {
            background: none; border: none; width: 100%; color: var(--main);
            font-weight: bold; font-size: 14px;
        }
        .field:focus-within { border-color: var(--main); background: var(--app); }

        .btn-login {
            width: 100%; padding: 15px; background: var(--main);
            color: white; border: none; border-radius: 18px;
            font-weight: bold; font-size: 16px; cursor: pointer;
            transition: 0.3s; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-login:active { transform: scale(0.95); }

        .back-btn { 
            display: block; text-align: center; margin-top: 20px;
            color: var(--p); text-decoration: none; 
            font-size: 14px; font-weight: bold; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="phone">
        <div class="header">
            <h2>تسجيل الدخول</h2>
            <p>أهلاً بك في عالم Cython الذكي</p>
        </div>

        <div class="content">
            <form id="loginForm">
                <div class="input-group">
                    <label>اسم المستخدم</label>
                    <div class="field">
                        <i class="fas fa-user-circle"></i>
                        <input type="text" id="userInput" placeholder="ادخل اسمك..." required>
                    </div>
                </div>

                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <div class="field">
                        <i class="fas fa-at"></i>
                        <input type="email" id="emailInput" placeholder="example@mail.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>كلمة مرور البايثون (Python Key)</label>
                    <div class="field">
                        <i class="fab fa-python"></i>
                        <input type="password" id="passInput" placeholder="أدخل رمز الـ Key الخاص بك..." required>
                    </div>
                </div>

                <button type="button" class="btn-login" onclick="handleLogin()">دخول الحساب</button>
            </form>

            <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
        </div>
    </div>

    <script>
        function handleLogin() {
            const username = document.getElementById('userInput').value;
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            
            if (!username || !email || !pass) {
                alert("يرجى إكمال البيانات المطلوبة للدخول");
                return;
            }

            // تخزين البيانات بصيغة مخصصة
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('username', username);
            localStorage.setItem('userEmail', email);
            localStorage.setItem('pythonKey', pass); // تم تغيير المفتاح ليكون خاصاً بالبايثون

            window.location.href = "index.html";
        }
    </script>
</body>
</html>
