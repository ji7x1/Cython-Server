<!DOCTYPE html>
<script>
    (function() {
        const mode = localStorage.getItem('themeMode') || 'dark';
        const color = localStorage.getItem('themeColor') || 'color-1';
        if (mode === 'dark') document.documentElement.classList.add('dark');
        if (color) document.documentElement.classList.add(color);
    })();
</script>

<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cython Grandmaster | Scoreboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');

        :root {
            --main: #4facfe; --bg: #f8f9fa; --card: #ffffff; --text: #000000; --panel: #f1f5f9; --border: rgba(0,0,0,0.1);
        }
        html.dark {
            --bg: #000000; --card: #121212; --text: #ffffff; --panel: #1e1e1e; --border: rgba(255,255,255,0.1);
        }

        /* نظام الألوان المتزامن */
        html.color-1 { --main: #00d2ff; } html.color-2 { --main: #ff4757; }
        html.color-3 { --main: #2ecc71; } html.color-4 { --main: #a29bfe; }
        html.color-5 { --main: #f1c40f; } html.color-6 { --main: #e84393; }
        html.color-7 { --main: #00d2d3; } html.color-8 { --main: #54a0ff; }
        html.color-9 { --main: #ae8b70; } html.color-10 { --main: #4b6584; }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; 
            -webkit-tap-highlight-color: transparent; outline: none;
            caret-color: transparent !important; 
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; font-family: 'JetBrains Mono', monospace; }

        body { background: var(--bg); display: flex; justify-content: center; height: 100vh; overflow: hidden; color: var(--text); }

        .app-container {
            width: 100%; max-width: 480px; height: 100vh;
            background: var(--bg); display: flex; flex-direction: column; position: relative;
        }

        /* زر العودة */
        .nav-header { padding: 40px 25px 10px; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { width: 45px; height: 45px; background: var(--panel); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); }

        .screen { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; scrollbar-width: none; }
        .screen::-webkit-scrollbar { display: none; }

        .glass-card {
            background: var(--card); border-radius: 35px; padding: 30px;
            border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        /* اختيار الألعاب */
        .game-opt {
            background: var(--panel); padding: 25px; border-radius: 25px;
            display: flex; align-items: center; gap: 20px; margin-bottom: 15px;
            border: 2px solid transparent; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .game-opt:active { transform: scale(0.96); border-color: var(--main); }
        .game-opt i { font-size: 32px; color: var(--main); filter: drop-shadow(0 0 10px var(--main)); }

        /* تباين الجدول */
        .table-wrapper { 
            border-radius: 28px; overflow: hidden; border: 2px solid var(--main); 
            background: var(--card); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .score-table { width: 100%; border-collapse: collapse; }
        .score-table th { background: var(--main); color: #000; padding: 22px 10px; font-weight: 900; font-size: 19px; }
        .score-table td { padding: 10px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
        
        .score-input { 
            width: 100%; height: 55px; background: var(--panel); border-radius: 15px;
            border: 1px solid var(--border); text-align: center; font-size: 24px; 
            font-weight: 900; color: var(--main); transition: 0.2s;
        }
        .score-input:focus { background: #fff; color: #000; box-shadow: 0 0 15px var(--main); }
        .dark .score-input:focus { background: #222; color: var(--main); }

        /* شريط النتائج العائم */
        .result-dock {
            margin: 20px; padding: 25px; border-radius: 30px;
            background: linear-gradient(145deg, var(--main), #000);
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
        }
        .score-box { text-align: center; color: white; }
        .score-box .val { font-family: 'JetBrains Mono'; font-size: 38px; font-weight: 900; display: block; line-height: 1; }
        .score-box .lab { font-size: 11px; font-weight: 900; opacity: 0.7; text-transform: uppercase; margin-top: 5px; }

        .btn-action { 
            width: 100%; padding: 20px; background: var(--main); color: #000; border: none; 
            border-radius: 25px; font-weight: 900; font-size: 18px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="nav-header">
        <div class="back-btn" onclick="location.href='index.html'"><i class="fas fa-arrow-right"></i></div>
        <div style="font-weight: 900; font-size: 18px; color: var(--main);">SCORE MASTER</div>
        <div style="width: 45px;"></div>
    </div>

    <div id="screen-home" class="screen" style="justify-content: center;">
        <h1 style="text-align: center; margin-bottom: 40px; font-weight: 900; font-size: 38px; letter-spacing: -1px;">سجل الملوك</h1>
        <div class="game-opt" onclick="initSetup('baloot')">
            <i class="fas fa-clone"></i>
            <div><b style="font-size: 22px; display: block;">لعبة الورق</b><small style="opacity:0.6; font-weight: 700;">نظام جولات (5 - 15)</small></div>
        </div>
        <div class="game-opt" onclick="initSetup('domino')">
            <i class="fas fa-dice-d6"></i>
            <div><b style="font-size: 22px; display: block;">لعبة الدومينو</b><small style="opacity:0.6; font-weight: 700;">نظام تراكمي (101 - 201)</small></div>
        </div>
    </div>

    <div id="screen-play" class="screen" style="display: none;">
        <div id="setup-box" class="glass-card">
            <h2 id="game-title" style="color: var(--main); margin-bottom: 25px; text-align: center;"></h2>
            <div style="display: grid; gap: 15px;">
                <input type="text" id="name1" placeholder="اسم الفريق الأول">
                <input type="text" id="name2" placeholder="اسم الفريق الثاني">
                <select id="limit-val" style="background: var(--panel); border: 1px solid var(--border); padding: 18px; border-radius: 15px; font-weight: 900;"></select>
            </div>
            <button class="btn-action" onclick="startNow()">بدء المواجهة</button>
        </div>

        <div id="game-table" style="display: none; padding-bottom: 40px;">
            <div class="table-wrapper">
                <table class="score-table">
                    <thead>
                        <tr><th style="width: 70px; border-left: 1px solid rgba(0,0,0,0.1);">#</th><th id="h1"></th><th id="h2"></th></tr>
                    </thead>
                    <tbody id="tBody"></tbody>
                </table>
            </div>
            <button class="btn-action" style="background: #ff4757; color: white;" onclick="location.reload()">إنهاء المباراة</button>
        </div>
    </div>

    <div id="res-bar" class="result-dock" style="display: none;">
        <div class="score-box"><span class="val" id="sum1">0</span><span class="lab" id="lab1">TEAM A</span></div>
        <div style="height: 40px; width: 1px; background: rgba(255,255,255,0.2);"></div>
        <div class="score-box"><span class="val" id="sum2">0</span><span class="lab" id="lab2">TEAM B</span></div>
    </div>
</div>

<script>
    let gMode = ''; let gLimit = 0;

    function initSetup(type) {
        gMode = type;
        document.getElementById('screen-home').style.display = 'none';
        document.getElementById('screen-play').style.display = 'block';
        const s = document.getElementById('limit-val'); s.innerHTML = '';
        
        if(type === 'baloot') {
            document.getElementById('game-title').innerText = 'إعدادات الورق';
            [5, 10, 15].forEach(v => s.innerHTML += `<option value="${v}">${v} جولات</option>`);
        } else {
            document.getElementById('game-title').innerText = 'إعدادات الدومينو';
            [101, 151, 201].forEach(v => s.innerHTML += `<option value="${v}">${v} نقطة خسارة</option>`);
        }
    }

    function startNow() {
        document.getElementById('setup-box').style.display = 'none';
        document.getElementById('game-table').style.display = 'block';
        document.getElementById('res-bar').style.display = 'flex';
        
        const n1 = document.getElementById('name1').value || 'الملوك';
        const n2 = document.getElementById('name2').value || 'الأساطير';
        gLimit = parseInt(document.getElementById('limit-val').value);
        
        document.getElementById('h1').innerText = n1;
        document.getElementById('h2').innerText = n2;
        document.getElementById('lab1').innerText = n1;
        document.getElementById('lab2').innerText = n2;

        const body = document.getElementById('tBody'); body.innerHTML = '';
        let rows = (gMode === 'baloot') ? gLimit : 12; // زيادة الأسطر للدومينو
        
        for(let i=1; i<=rows; i++) {
            body.innerHTML += `<tr>
                <td style="text-align:center; font-weight:900; opacity: 0.5; font-family: 'JetBrains Mono';">${i}</td>
                <td><input type="number" class="score-input v1" oninput="update()"></td>
                <td><input type="number" class="score-input v2" oninput="update()"></td>
            </tr>`;
        }
    }

    function update() {
        let s1 = 0, s2 = 0;
        document.querySelectorAll('.v1').forEach(i => s1 += parseInt(i.value || 0));
        document.querySelectorAll('.v2').forEach(i => s2 += parseInt(i.value || 0));
        
        document.getElementById('sum1').innerText = s1;
        document.getElementById('sum2').innerText = s2;

        if(gMode === 'domino') {
            if(s1 >= gLimit) { alert("المقبرة لـ: " + document.getElementById('h1').innerText); location.reload(); }
            else if(s2 >= gLimit) { alert("المقبرة لـ: " + document.getElementById('h2').innerText); location.reload(); }
        }
    }
</script>
</body>
</html>
