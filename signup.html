<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - Cython 2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script>
        (function() {
            const savedColor = localStorage.getItem('themeColor');
            const savedMode = localStorage.getItem('themeMode');
            if (savedColor) document.documentElement.classList.add(savedColor);
            if (savedMode === 'dark') document.documentElement.classList.add('dark');
            const bg = savedMode === 'dark' ? '#111' : '#f4f7f9';
            document.documentElement.style.backgroundColor = bg;
        })();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        :root { --main: #4facfe; --bg: #f4f7f9; --app: #ffffff; --p: #555; --input-bg: #f0f8ff; }
        html.dark { --bg: #111 !important; --app: #222 !important; --p: #bbb !important; --input-bg: #333 !important; }

        html.color-1 { --main: #4facfe; } html.color-2 { --main: #ff6b6b; }
        html.color-3 { --main: #51cf66; } html.color-4 { --main: #a29bfe; }
        html.color-5 { --main: #fab005; } html.color-6 { --main: #ff85a1; }
        html.color-7 { --main: #20c997; } html.color-8 { --main: #5c7cfa; }
        html.color-9 { --main: #a67c52; } html.color-10 { --main: #333333; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; outline: none !important; }
        body { background-color: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .phone { 
            width: 350px; height: 700px; background: var(--app); 
            border-radius: 40px; display: flex; flex-direction: column; 
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            position: relative; border: 8px solid #222; 
        }

        .header { padding: 45px 30px 10px; text-align: center; }
        .header h2 { color: var(--main); font-size: 26px; font-weight: 900; }

        .content { flex: 1; padding: 15px 30px; overflow-y: auto; }

        .input-group { margin-bottom: 12px; text-align: right; }
        .input-group label { display: block; margin-bottom: 4px; color: var(--main); font-weight: bold; font-size: 13px; }
        
        .field {
            width: 100%; padding: 12px 15px; border-radius: 12px;
            background: var(--input-bg); display: flex; align-items: center; gap: 10px;
        }
        .field input { background: none; border: none; width: 100%; color: var(--main); font-weight: bold; font-size: 14px; }

        .btn-signup {
            width: 100%; padding: 15px; background: var(--main);
            color: white; border: none; border-radius: 15px;
            font-weight: bold; font-size: 16px; cursor: pointer;
            margin-top: 15px; transition: 0.3s;
        }
        .btn-signup:active { transform: scale(0.98); }

        .social-divider {
            display: flex; align-items: center; margin: 20px 0;
            color: var(--p); font-size: 12px; font-weight: bold;
        }
        .social-divider::before, .social-divider::after {
            content: ""; flex: 1; height: 1px; background: rgba(0,0,0,0.1); margin: 0 10px;
        }

        .social-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            justify-items: center; margin-bottom: 20px;
        }
        .social-item {
            text-decoration: none; cursor: pointer; transition: 0.3s;
        }
        .social-item i {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .bg-google { background: #db4437; }
        .bg-fb { background: #1877f2; }
        .bg-insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .bg-x { background: #000; }
        .bg-tiktok { background: #000; }
        .bg-linkedin { background: #0077b5; }

        .back-btn { display: block; text-align: center; color: var(--p); text-decoration: none; font-size: 14px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="phone">
        <div class="header">
            <h2>إنشاء حساب</h2>
            <p style="color:var(--p); font-size: 13px;">ابدأ رحلتك مع Cython 2.0</p>
        </div>

        <div class="content">
            <form id="signupForm">
                <div class="input-group">
                    <label>الاسم الكامل</label>
                    <div class="field"><i class="fas fa-user"></i><input type="text" id="userInput" placeholder="علي كمال"></div>
                </div>
                
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <div class="field"><i class="fas fa-envelope"></i><input type="email" id="emailInput" placeholder="name@example.com"></div>
                </div>

                <div class="input-group">
                    <label>كلمة المرور</label>
                    <div class="field"><i class="fas fa-lock"></i><input type="password" id="passInput" placeholder="اختار كلمة سر"></div>
                </div>

                <button type="button" class="btn-signup" onclick="handleSignup()">إنشاء حساب</button>
            </form>

            <div class="social-divider">أو الدخول بضغطة واحدة</div>

            <div class="social-grid">
                <div class="social-item" onclick="quickLogin('Google User')"><i class="fab fa-google bg-google"></i></div>
                <div class="social-item" onclick="quickLogin('FB User')"><i class="fab fa-facebook-f bg-fb"></i></div>
                <div class="social-item" onclick="quickLogin('Insta User')"><i class="fab fa-instagram bg-insta"></i></div>
                <div class="social-item" onclick="quickLogin('X User')"><i class="fab fa-x-twitter bg-x"></i></div>
                <div class="social-item" onclick="quickLogin('TikTok User')"><i class="fab fa-tiktok bg-tiktok"></i></div>
                <div class="social-item" onclick="quickLogin('LinkedIn User')"><i class="fab fa-linkedin-in bg-linkedin"></i></div>
            </div>

            <a href="index.html" class="back-btn"><i class="fas fa-chevron-right"></i> العودة للرئيسية</a>
        </div>
    </div>

    <script>
        function quickLogin(name) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('username', name);
            window.location.href = "index.html";
        }

        function handleSignup() {
            const user = document.getElementById('userInput').value;
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            
            if(!user || !email || !pass) {
                alert("يرجى ملء جميع الحقول لإنشاء الحساب");
                return;
            }
            
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('username', user);
            localStorage.setItem('userEmail', email);
            alert("تم إنشاء حسابك بنجاح! أهلاً بك.");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
