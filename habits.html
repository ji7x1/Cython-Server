<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cython Habits - Final Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // تطبيق الثيم المختار من الصفحة الرئيسية
        (function() {
            const mode = localStorage.getItem('themeMode');
            const color = localStorage.getItem('themeColor');
            if (mode === 'dark') document.documentElement.classList.add('dark');
            if (color) document.documentElement.classList.add(color);
        })();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        :root { 
            --main: #4facfe; --bg: #f4f7f9; --card: #fff; --text: #1e293b; --border: rgba(0,0,0,0.06);
        }
        
        /* الألوان المتغيرة بناءً على اختيار المستخدم */
        html.color-1 { --main: #4facfe; } html.color-2 { --main: #ff6b6b; }
        html.color-3 { --main: #51cf66; } html.color-4 { --main: #a29bfe; }
        html.color-5 { --main: #fab005; } html.color-6 { --main: #ff85a1; }
        html.color-7 { --main: #20c997; } html.color-8 { --main: #5c7cfa; }
        html.color-9 { --main: #a67c52; } html.color-10 { --main: #333333; }

        html.dark { 
            --bg: #0d0d0d; --card: #1a1a1a; --text: #f0f0f0; --border: rgba(255,255,255,0.08);
        }

        /* الإعدادات العامة - حذف مؤشر الكتابة والتحديد */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Cairo', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none; caret-color: transparent; outline: none;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
        }

        .app-container { 
            width: 100%; 
            max-width: 500px; 
            height: 100vh; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }

        /* الهيدر مع مسافة عن الحواف */
        .header { 
            padding: 35px 35px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .header h1 { font-size: 22px; font-weight: 900; color: var(--main); }

        .nav-tools { display: flex; align-items: center; gap: 20px; }
        .tool-icon { font-size: 19px; color: var(--main); cursor: pointer; transition: 0.3s; }
        .tool-icon-hidden { display: none; }

        /* القائمة المنسدلة */
        .menu-wrapper { position: relative; }
        .dropdown {
            position: absolute; top: 40px; left: 0; background: var(--card);
            border: 1px solid var(--border); border-radius: 18px; width: 140px;
            display: none; box-shadow: 0 15px 35px rgba(0,0,0,0.2); z-index: 1000;
            overflow: hidden; animation: popIn 0.2s ease-out;
        }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .dropdown div { padding: 14px 18px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--border); text-align: right; }
        .dropdown div:active { background: var(--main); color: white; }

        /* قائمة المهام */
        .content { flex: 1; overflow-y: auto; padding: 10px 35px 120px; }
        .habit-item { 
            background: var(--card); padding: 20px; border-radius: 24px; 
            display: flex; align-items: center; margin-bottom: 15px; 
            border: 1px solid var(--border); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .habit-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .habit-text { font-weight: 700; font-size: 16px; }
        .habit-type { font-size: 11px; color: var(--main); font-weight: bold; opacity: 0.8; }
        .completed { opacity: 0.5; }
        .completed .habit-text { text-decoration: line-through; }

        /* دوائر التحديد */
        .select-circle { width: 24px; height: 24px; border: 2px solid var(--main); border-radius: 50%; display: none; margin-left: 15px; transition: 0.2s; }
        .select-circle.active { background: var(--main); box-shadow: inset 0 0 0 4px var(--card); }

        /* زر الصح المربع */
        .check-btn { width: 32px; height: 32px; border-radius: 12px; border: 2px solid var(--main); display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .check-btn.checked { background: var(--main); color: white; }

        /* المودال الاحترافي */
        .modal-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.4); 
            display: none; align-items: center; justify-content: center; z-index: 2000;
            backdrop-filter: blur(8px);
        }
        .modal {
            width: 82%; background: var(--card); padding: 30px; border-radius: 35px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4); transform: scale(0.8); transition: 0.3s;
        }
        .modal.active { transform: scale(1); }
        .modal h2 { margin-bottom: 20px; text-align: center; font-size: 18px; }
        .modal input, .modal select {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 15px;
            border: 1px solid var(--border); background: var(--bg); color: var(--text); font-weight: bold;
            caret-color: var(--main); /* يظهر المؤشر فقط عند الكتابة داخل الحقول لسهولة الاستخدام */
        }

        /* رسالة التنبيه (Toast) */
        .toast {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--main); color: white; padding: 14px 30px; border-radius: 50px;
            font-weight: bold; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 3000;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* زر الإضافة */
        .add-btn {
            position: absolute; bottom: 40px; left: 35px; width: 65px; height: 65px;
            background: var(--main); color: white; border-radius: 24px;
            display: flex; align-items: center; justify-content: center; font-size: 28px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2); cursor: pointer; transition: 0.3s;
        }
        .add-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="toast" class="toast">عمل رائع! آمل أن تقوم به ✨</div>

        <div class="modal-overlay" id="modalOverlay" onclick="if(event.target==this) closeModal()">
            <div class="modal" id="modal">
                <h2 id="modalTitle">إضافة خطة جديدة</h2>
                <input type="text" id="habitInput" placeholder="اكتب مهمتك...">
                <select id="typeInput">
                    <option value="💡 عام">عام</option>
                    <option value="📚 دراسة">دراسة</option>
                    <option value="💼 عمل">عمل</option>
                    <option value="🍎 صحة">صحة</option>
                </select>
                <div style="display:flex; gap:12px;">
                    <button style="flex:1; padding:15px; border-radius:15px; border:none; background:rgba(0,0,0,0.05); color:var(--text); font-weight:900;" onclick="closeModal()">إلغاء</button>
                    <button id="modalSubmit" style="flex:1; padding:15px; border-radius:15px; border:none; background:var(--main); color:white; font-weight:900;">حفظ</button>
                </div>
            </div>
        </div>

        <div class="header">
            <i class="fas fa-home tool-icon" onclick="location.href='index.html'"></i>
            
            <h1>المهام</h1>

            <div class="nav-tools">
                <i class="fas fa-trash-alt tool-icon tool-icon-hidden" id="btnDelete" onclick="deleteSelected()"></i>
                
                <div class="menu-wrapper">
                    <i class="fas fa-share-nodes tool-icon tool-icon-hidden" id="btnExport" onclick="toggleMenu('exportMenu')"></i>
                    <div class="dropdown" id="exportMenu">
                        <div onclick="window.print()">تصدير PDF</div>
                        <div onclick="window.print()">حفظ كصورة</div>
                    </div>
                </div>

                <div class="menu-wrapper">
                    <i class="fas fa-ellipsis-v tool-icon" onclick="toggleMenu('mainMenu')"></i>
                    <div class="dropdown" id="mainMenu">
                        <div onclick="enableSelection()">تحديد</div>
                        <div onclick="enableEditMode()">تعديل مهمة</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="content" id="habitList">
            </div>

        <div class="add-btn" onclick="openModalForAdd()">
            <i class="fas fa-plus"></i>
        </div>
    </div>

    <script>
        let isSelectionMode = false;
        let isEditMode = false;
        let currentEditingItem = null;

        function toggleMenu(id) {
            const menu = document.getElementById(id);
            const isVisible = menu.style.display === 'block';
            document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
            menu.style.display = isVisible ? 'none' : 'block';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            setTimeout(() => {
                document.getElementById('modalOverlay').style.display = 'none';
                isEditMode = false;
            }, 300);
        }

        function openModalForAdd() {
            document.getElementById('modalTitle').innerText = "إضافة خطة جديدة";
            document.getElementById('habitInput').value = "";
            document.getElementById('modalSubmit').onclick = saveNewHabit;
            document.getElementById('modalOverlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modal').classList.add('active'), 10);
        }

        function saveNewHabit() {
            const text = document.getElementById('habitInput').value;
            const type = document.getElementById('typeInput').value;
            if(!text.trim()) return;
            createHabitElement(text, type);
            closeModal();
            showToast();
        }

        function createHabitElement(text, type) {
            const list = document.getElementById('habitList');
            const div = document.createElement('div');
            div.className = 'habit-item';
            div.onclick = function() { if(isEditMode) openModalForEdit(div); };
            div.innerHTML = `
                <div class="select-circle" onclick="event.stopPropagation(); this.classList.toggle('active')"></div>
                <div class="habit-info">
                    <span class="habit-text">${text}</span>
                    <span class="habit-type">${type}</span>
                </div>
                <div class="check-btn" onclick="event.stopPropagation(); toggleComplete(this)"><i class="fas fa-check"></i></div>
            `;
            list.prepend(div);
        }

        function enableEditMode() {
            isEditMode = !isEditMode;
            document.getElementById('mainMenu').style.display = 'none';
            if(isEditMode) showToastMessage("انقر على المهمة لتعديلها");
        }

        function openModalForEdit(item) {
            currentEditingItem = item;
            document.getElementById('modalTitle').innerText = "تعديل المهمة";
            document.getElementById('habitInput').value = item.querySelector('.habit-text').innerText;
            document.getElementById('typeInput').value = item.querySelector('.habit-type').innerText;
            document.getElementById('modalSubmit').onclick = saveEdit;
            document.getElementById('modalOverlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modal').classList.add('active'), 10);
        }

        function saveEdit() {
            if(currentEditingItem) {
                currentEditingItem.querySelector('.habit-text').innerText = document.getElementById('habitInput').value;
                currentEditingItem.querySelector('.habit-type').innerText = document.getElementById('typeInput').value;
            }
            closeModal();
            showToastMessage("تم التعديل بنجاح ✅");
        }

        function toggleComplete(btn) {
            btn.classList.toggle('checked');
            btn.closest('.habit-item').classList.toggle('completed');
        }

        function enableSelection() {
            isSelectionMode = !isSelectionMode;
            document.getElementById('btnDelete').style.display = isSelectionMode ? 'block' : 'none';
            document.getElementById('btnExport').style.display = isSelectionMode ? 'block' : 'none';
            document.getElementById('mainMenu').style.display = 'none';
            document.querySelectorAll('.select-circle').forEach(el => el.style.display = isSelectionMode ? 'block' : 'none');
            document.querySelectorAll('.check-btn').forEach(el => el.style.display = isSelectionMode ? 'none' : 'flex');
        }

        function deleteSelected() {
            const selected = document.querySelectorAll('.select-circle.active');
            selected.forEach(el => el.closest('.habit-item').remove());
            enableSelection();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.innerText = "عمل رائع! آمل أن تقوم به ✨";
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showToastMessage(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        window.onclick = function(e) {
            if (!e.target.closest('.menu-wrapper')) {
                document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
            }
        }

        // مهمة افتراضية عند البدء
        window.onload = () => createHabitElement("ابدأ رحلتك مع سايثون", "💡 عام");
    </script>
</body>
</html>
