<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cython Pro Camera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script>
        (function() {
            const savedColor = localStorage.getItem('themeColor');
            const savedMode = localStorage.getItem('themeMode');
            if (savedColor) document.documentElement.classList.add(savedColor);
            if (savedMode === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --main: #4facfe; --app: #ffffff; --bg: #f4f7f9; }
        html.dark { --app: #111; --bg: #000; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; caret-color: transparent !important; outline: none !important; }
        body { background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .phone { 
            width: 350px; height: 700px; background: #000; border-radius: 45px; 
            display: flex; flex-direction: column; overflow: hidden; position: relative; border: 8px solid #222; 
        }

        #video-container { position: absolute; inset: 0; z-index: 1; transition: 0.3s; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* تأثير ومضة الفلاش */
        #flash-overlay { position: absolute; inset: 0; z-index: 5; pointer-events: none; background: #fff; opacity: 0; }
        .flash-blink-active { animation: blink 0.15s ease-out; }
        @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0; } }

        .top-bar { position: absolute; top: 40px; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; z-index: 100; }
        
        .icon-btn { 
            width: 45px; height: 45px; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: white; border: 1px solid rgba(255,255,255,0.2); transition: 0.4s;
        }

        /* تنسيق الفلاش المطلوب: أبيض سادة عند الإطفاء وأصفر عند التشغيل */
        .flash-off-style { color: #ffffff !important; opacity: 1; filter: none; }
        .flash-on-style { color: #ffeb3b !important; filter: drop-shadow(0 0 10px #ffeb3b); transform: scale(1.1); }

        /* القائمة الجانبية */
        .sidebar { position: absolute; top: 100px; left: -220px; width: 180px; background: rgba(0,0,0,0.75); backdrop-filter: blur(20px); border-radius: 0 25px 25px 0; padding: 15px; z-index: 90; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar.active { left: 0; }
        .mode-item { color: white; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; font-size: 13px; border-radius: 15px; background: rgba(255,255,255,0.05); cursor: pointer; }

        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 140px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); z-index: 10; display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; }
        
        /* زر المعرض الاحترافي */
        .gallery-btn { width: 55px; height: 55px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.8); position: relative; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
        .gallery-btn i { font-size: 22px; color: white; }
        .gallery-btn img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 12px; opacity: 0; z-index: 2; }
        .count-badge { position: absolute; top: -8px; right: -8px; background: var(--main); color: white; font-size: 11px; min-width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 900; border: 2px solid #000; z-index: 10; }

        .shutter { width: 75px; height: 75px; border-radius: 50%; border: 4px solid #fff; padding: 5px; cursor: pointer; }
        .shutter-in { width: 100%; height: 100%; background: #fff; border-radius: 50%; transition: 0.2s; }
        .shutter-in:active { transform: scale(0.85); background: var(--main); }

        .gallery-overlay { position: absolute; inset: 0; background: var(--app); z-index: 200; display: none; flex-direction: column; padding: 40px 20px; overflow-y: auto; }
        .loader-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .loader { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--main); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="phone">
        <div id="flash-overlay"></div>
        <div id="video-container"><video id="webcam" autoplay playsinline></video></div>

        <div class="top-bar">
            <div class="icon-btn" onclick="toggleFlash()" id="flash-btn">
                <i id="flash-icon" class="fas fa-bolt flash-off-style"></i>
            </div>
            <div class="icon-btn" onclick="switchCamera()"><i class="fas fa-camera-rotate"></i></div>
            <div class="icon-btn" id="main-menu-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars" id="menu-icon"></i>
            </div>
        </div>

        <div id="sidebar" class="sidebar">
            <div class="mode-item" onclick="changeMode('fas fa-robot')"><i class="fas fa-robot"></i> ذكاء اصطناعي</div>
            <div class="mode-item" onclick="changeMode('fas fa-qrcode')"><i class="fas fa-qrcode"></i> ماسح ضوئي</div>
            <div class="mode-item" onclick="changeMode('fas fa-bars')"><i class="fas fa-undo"></i> عادي</div>
        </div>

        <div class="bottom-nav">
            <div class="gallery-btn" onclick="showGallery()">
                <i class="fas fa-images"></i>
                <img id="last-thumb" src="">
                <span class="count-badge" id="img-count">0</span>
            </div>
            <div class="shutter" onclick="capture()"><div class="shutter-in"></div></div>
            <div class="icon-btn" onclick="window.location.href='index.html'"><i class="fas fa-house"></i></div>
        </div>

        <div id="gallery-ui" class="gallery-overlay">
            <div style="text-align:center">
                <div style="width:65px;height:65px;background:var(--main);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;color:white;font-size:30px;"><i class="fas fa-images"></i></div>
                <h2 style="color:var(--main); font-weight:900">معرض Cython</h2>
            </div>
            <div class="grid" id="images-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:15px;"></div>
            <div style="margin-top:25px">
                <button onclick="exportPDF()" style="width:100%; padding:15px; border:none; border-radius:18px; background:var(--main); color:white; font-weight:900; margin-bottom:10px;"><i class="fas fa-file-pdf"></i> حفظ كـ PDF</button>
                <button onclick="sendToCython()" style="width:100%; padding:15px; border:none; border-radius:18px; background:#333; color:white; font-weight:900;"><i class="fas fa-paper-plane"></i> إرسال لسايثون</button>
                <button onclick="hideGallery()" style="width:100%; background:none; border:none; color:var(--main); font-weight:bold; padding:10px">إغلاق</button>
            </div>
        </div>

        <div id="loader" class="loader-overlay">
            <div class="loader"></div>
            <p id="loader-text" style="margin-top:15px">جاري المعالجة...</p>
        </div>
    </div>

    <canvas id="canvas" style="display:none"></canvas>

    <script>
        let images = [];
        let stream;
        let isFront = false;
        let flashActive = false;

        async function init() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: isFront ? 'user' : 'environment' } });
                document.getElementById('webcam').srcObject = stream;
            } catch (e) { console.log("Camera access denied"); }
        }

        function toggleFlash() {
            const icon = document.getElementById('flash-icon');
            flashActive = !flashActive;
            
            if (flashActive) {
                icon.className = "fas fa-bolt flash-on-style";
                document.getElementById('video-container').style.filter = "brightness(1.2)";
            } else {
                icon.className = "fas fa-bolt flash-off-style";
                document.getElementById('video-container').style.filter = "none";
            }
        }

        function capture() {
            if (images.length >= 20) return;

            // ومضة الفلاش
            const flashOverlay = document.getElementById('flash-overlay');
            flashOverlay.classList.remove('flash-blink-active');
            void flashOverlay.offsetWidth; 
            flashOverlay.classList.add('flash-blink-active');

            const v = document.getElementById('webcam'), c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            
            const img = c.toDataURL('image/jpeg', 0.6);
            images.push(img);
            
            const thumb = document.getElementById('last-thumb');
            thumb.src = img; thumb.style.opacity = "1";
            document.getElementById('img-count').innerText = images.length;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('menu-icon');
            sidebar.classList.toggle('active');
            
            if(sidebar.classList.contains('active')) {
                icon.className = "fas fa-times";
                document.getElementById('video-container').style.filter = "blur(8px) brightness(0.7)";
            } else {
                const savedIcon = localStorage.getItem('currentModeIcon') || 'fas fa-bars';
                icon.className = savedIcon;
                document.getElementById('video-container').style.filter = flashActive ? "brightness(1.2)" : "none";
            }
        }

        function changeMode(newIcon) {
            localStorage.setItem('currentModeIcon', newIcon);
            document.getElementById('menu-icon').className = newIcon;
            toggleSidebar();
        }

        function showGallery() {
            const grid = document.getElementById('images-grid');
            grid.innerHTML = images.map(src => `<img src="${src}" style="width:100%; height:100px; object-fit:cover; border-radius:12px;">`).join('');
            document.getElementById('gallery-ui').style.display = 'flex';
        }
        function hideGallery() { document.getElementById('gallery-ui').style.display = 'none'; }
        function switchCamera() { isFront = !isFront; init(); }
        function showLoader(t) { document.getElementById('loader-text').innerText = t; document.getElementById('loader').style.display = 'flex'; }
        function hideLoader() { document.getElementById('loader').style.display = 'none'; }

        async function exportPDF() {
            if (images.length === 0) return;
            showLoader("تجهيز PDF...");
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            images.forEach((img, i) => {
                if (i > 0) pdf.addPage();
                pdf.addImage(img, 'JPEG', 10, 10, 190, 250);
            });
            pdf.save("Cython_Gallery.pdf");
            setTimeout(hideLoader, 1000);
        }

        function sendToCython() {
            if (images.length === 0) return;
            showLoader("جاري الإرسال...");
            const payload = images.map(img => ({ sender: 'user', type: 'image', content: img }));
            localStorage.setItem('cython_incoming_chat', JSON.stringify(payload));
            setTimeout(() => { window.location.href = 'chat.html'; }, 1000);
        }

        init();
    </script>
</body>
</html>
