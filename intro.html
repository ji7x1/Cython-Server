<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Cython 2.0 - Robot Animation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Cairo', sans-serif; }

        /* إطار الهاتف */
        .phone {
            width: 350px; height: 720px; background: #fff;
            border-radius: 50px; border: 10px solid #333;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        /* شبكة خلفية فاتحة */
        .bg-grid {
            position: absolute; inset: 0;
            background-image: radial-gradient(#4facfe 0.5px, transparent 0.5px);
            background-size: 20px 20px; opacity: 0.1;
        }

        /* الروبوتات الصغيرة التي تخرج من الأطراف */
        .mini-robot {
            position: absolute; color: #4facfe; font-size: 20px;
            opacity: 0; animation: spawnRobot 4s infinite;
        }

        @keyframes spawnRobot {
            0% { transform: scale(0) translateY(0); opacity: 0; }
            20% { opacity: 0.5; transform: scale(1.2); }
            50% { opacity: 0.8; transform: scale(1) translateY(-20px); }
            100% { opacity: 0; transform: scale(0.5) translateY(-50px); }
        }

        /* الروبوت المركزي القائد */
        .main-robot {
            margin-top: 150px; font-size: 80px; color: #4facfe;
            z-index: 10; position: relative;
            animation: floatRobot 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(79, 172, 254, 0.4));
        }

        @keyframes floatRobot {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* دوائر النبض خلف الروبوت */
        .pulse-ring {
            position: absolute; width: 100px; height: 100px;
            border: 2px solid #4facfe; border-radius: 50%;
            top: 180px; z-index: 1;
            animation: ripple 2s linear infinite;
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* اسم النظام */
        .title {
            margin-top: 30px; font-size: 35px; font-weight: 900;
            color: #333; z-index: 10; letter-spacing: 2px;
        }

        .loading-bar {
            width: 150px; height: 4px; background: #eee;
            border-radius: 10px; margin-top: 20px; overflow: hidden;
        }

        .loading-progress {
            width: 0%; height: 100%; background: #4facfe;
            animation: load 3s forwards;
        }

        @keyframes load { to { width: 100%; } }

    </style>
</head>
<body>

    <div class="phone">
        <div class="bg-grid"></div>
        
        <i class="fas fa-robot mini-robot" style="top:20%; left:10%; animation-delay: 0s;"></i>
        <i class="fas fa-robot mini-robot" style="top:50%; right:15%; animation-delay: 1s;"></i>
        <i class="fas fa-robot mini-robot" style="bottom:30%; left:20%; animation-delay: 2s;"></i>
        <i class="fas fa-robot mini-robot" style="top:15%; right:25%; animation-delay: 1.5s;"></i>

        <div class="pulse-ring"></div>
        <div class="pulse-ring" style="animation-delay: 0.5s;"></div>

        <div class="main-robot">
            <i class="fas fa-robot"></i>
        </div>

        <h1 class="title">Cython 2.0</h1>
        
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
    </div>


<script>
        // الانتقال التلقائي بعد انتهاء التحميل
        setTimeout(() => {
            window.location.href = "index.html";
        }, 3500);
    </script>

</body>
</html>
