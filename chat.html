<!DOCTYPE html>
<script>
    (function() {
        const mode = localStorage.getItem('themeMode');
        const color = localStorage.getItem('themeColor');
        if (mode === 'dark') document.documentElement.classList.add('dark');
        if (color) document.documentElement.classList.add(color);
        const bg = mode === 'dark' ? '#111' : '#f4f7f9';
        document.documentElement.style.backgroundColor = bg;
    })();
</script>

<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cython 2.0 - Chat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        :root { 
            --main: #4facfe; --bg: #f4f7f9; --app: #ffffff; 
            --text: #222; --ai-bubble: #f0f2f5; --user-bubble: var(--main); --p: #555;
        }
        
        html.color-1 { --main: #4facfe; } html.color-2 { --main: #ff6b6b; }
        html.color-3 { --main: #51cf66; } html.color-4 { --main: #a29bfe; }
        html.color-5 { --main: #fab005; } html.color-6 { --main: #ff85a1; }
        html.color-7 { --main: #20c997; } html.color-8 { --main: #5c7cfa; }
        html.color-9 { --main: #a67c52; } html.color-10 { --main: #333333; }
        html.dark { --bg: #111 !important; --app: #222 !important; --text: #fff !important; --ai-bubble: #333 !important; --p: #bbb !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; outline: none !important; caret-color: transparent !important; }
        
        body { 
            background: var(--bg); height: 100vh; display: flex; 
            justify-content: center; align-items: center; overflow: hidden; 
            transition: 0.3s; width: 100%;
        }

        .phone { 
            width: 100%; height: 100%; max-width: 500px; 
            background: var(--app); display: flex; flex-direction: column; 
            position: relative; overflow: hidden; transition: 0.3s;
        }

        @media (min-width: 501px) {
            .phone {
                height: 92vh; border-radius: 40px; border: 8px solid #222;
                box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            }
        }

        .header { 
            height: calc(65px + env(safe-area-inset-top)); 
            padding: env(safe-area-inset-top) 15px 0; 
            background: var(--main); color: white; display: flex; 
            justify-content: space-between; align-items: center; z-index: 5000; 
        }

        .back-btn { cursor: pointer; padding: 10px; font-size: 18px; }

        .menu-wrapper { position: absolute; top: calc(70px + env(safe-area-inset-top)); left: 15px; z-index: 9000; display: none; background: var(--app); border-radius: 18px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 200px; padding: 8px; border: 1px solid rgba(0,0,0,0.1); color: var(--text); }
        .menu-wrapper.active { display: block; }
        .menu-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .sub-menu { display: none; margin-top: 5px; border-right: 3px solid var(--main); padding-right: 10px; background: var(--bg); border-radius: 10px; overflow: hidden; }
        .sub-menu.active { display: block; }

        .messages { flex: 1; padding: 15px; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 18px; font-size: 14px; position: relative; word-wrap: break-word; color: var(--text); animation: fadeIn 0.3s ease; }
        .msg.ai { background: var(--ai-bubble); align-self: flex-start; border-bottom-right-radius: 4px; }
        .msg.user { background: var(--user-bubble); color: white; align-self: flex-end; border-bottom-left-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        .tools { display: flex; gap: 10px; margin-top: 8px; font-size: 11px; font-weight: bold; color: var(--main); }
        .tools span { cursor: pointer; }

        .input-box { 
            height: calc(75px + env(safe-area-inset-bottom)); 
            padding: 5px 10px env(safe-area-inset-bottom); 
            display: flex; align-items: center; gap: 8px; 
            background: var(--app); border-top: 1px solid rgba(0,0,0,0.05); 
        }

        .input-box input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: var(--bg); color: var(--text); outline: none; font-size: 16px; }
        
        .circle-btn { 
            width: 45px; height: 45px; border-radius: 50%; 
            background: var(--bg); color: var(--p); display: flex; 
            justify-content: center; align-items: center; cursor: pointer; 
            border: none; flex-shrink: 0; transition: 0.2s;
        }
        .circle-btn:active { transform: scale(0.9); }
        #clipBtn i { transform: rotate(45deg); font-size: 18px; } /* تعديل المكبس */
        
        .send-btn { background: var(--main); color: white; }
        .mic-active { color: #ff4757; animation: pulse 1.5s infinite; }

        .attach-box { position: absolute; bottom: calc(85px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: 92%; background: var(--app); border-radius: 25px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); display: none; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px; z-index: 4000; border: 1px solid rgba(0,0,0,0.1); }
        .attach-box.active { display: grid; }
        .btn-attach { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 15px; background: var(--bg); border-radius: 20px; cursor: pointer; color: var(--text); font-size: 13px; }

        #toast { position: absolute; top: calc(100px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 20px; border-radius: 20px; font-size: 12px; z-index: 110000; display: none; }
        
        .drawing-pad { position: absolute; inset: 0; background: var(--app); z-index: 10000; display: none; flex-direction: column; }
        #canvas { background: #fff; flex: 1; touch-action: none; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="phone" id="captureArea">
    <div id="toast"></div>

    <div class="drawing-pad" id="drawingPad">
        <div style="padding: calc(40px + env(safe-area-inset-top)) 15px 15px; background: var(--main); color: white; display: flex; justify-content: space-between; align-items: center;">
            <span onclick="closeDrawing()" style="cursor:pointer">إلغاء</span>
            <b>لوحة الرسم</b>
            <span onclick="saveDrawing()" style="font-weight:bold; cursor:pointer">إرسال</span>
        </div>
        <canvas id="canvas"></canvas>
        <div style="height: calc(85px + env(safe-area-inset-bottom)); background: var(--bg); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom);">
            <button onclick="clearCanvas()" class="circle-btn"><i class="fas fa-eraser"></i></button>
            <input type="color" id="colorPicker" value="#000000" style="width:40px; height:40px; border:none; background:none;">
            <button onclick="saveDrawing()" class="circle-btn" style="background:var(--main); color:white; width:60px;"><i class="fas fa-check"></i></button>
        </div>
    </div>

    <div class="header">
        <i class="fas fa-chevron-right back-btn" onclick="window.location.href='index.html'"></i>
        <span style="font-weight: 900;">CYTHON 2.0</span>
        <i class="fas fa-ellipsis-v" id="dotsBtn" style="padding:10px; cursor:pointer;"></i>
        
        <div class="menu-wrapper" id="mainMenu">
            <div class="menu-item" onclick="showToast('السجل فارغ')"><i class="fas fa-history" style="color:#6c5ce7"></i> سجل الدردشة</div>
            <div class="menu-item" onclick="location.reload()" style="color:#ff4757"><i class="fas fa-trash-alt"></i> مسح المحادثة</div>
            <div class="menu-item" id="shareTrigger">
                <i class="fas fa-share-alt" style="color:#0984e3"></i> مشاركة 
                <i class="fas fa-chevron-left" style="margin-right:auto; font-size:10px;"></i>
            </div>
            <div class="sub-menu" id="shareSub">
                <div class="menu-item" onclick="saveAsPDF()"><i class="fas fa-file-pdf" style="color:red"></i> ملف PDF</div>
                <div class="menu-item" onclick="saveAsImage()"><i class="fas fa-image" style="color:green"></i> صورة المحادثة</div>
                <div class="menu-item" onclick="copyAppLink()"><i class="fas fa-link" style="color:blue"></i> نسخ الرابط</div>
            </div>
        </div>
    </div>

    <div class="messages" id="chatbox">
        <div class="msg ai" data-original="مرحبا انا Cython 2.0 شلون اكدر اخدمك ؟">
            مرحبا انا Cython 2.0 شلون اكدر اخدمك ؟
            <div class="tools">
                <span onclick="speak(this)">استماع</span>
                <span onclick="translateMsg(this)">ترجمة</span>
                <span onclick="resetMsg(this)" style="background:rgba(0,0,0,0.05); padding:0 4px; border-radius:4px; color:var(--text)">AB</span>
            </div>
        </div>
    </div>

    <div class="attach-box" id="attachMenu">
        <div class="btn-attach" onclick="openDrawing()"><i class="fas fa-paint-brush" style="color:#e67e22; font-size:20px;"></i><b>رسم</b></div>
        <div class="btn-attach" onclick="document.getElementById('fileIn').click()"><i class="fas fa-image" style="color:#2ecc71; font-size:20px;"></i><b>صور</b></div>
        <div class="btn-attach" onclick="window.location.href='camera.html'"><i class="fas fa-camera" style="color:#3498db; font-size:20px;"></i><b>كاميرا</b></div>
        <div class="btn-attach" onclick="document.getElementById('fileIn').click()"><i class="fas fa-file-alt" style="color:#9b59b6; font-size:20px;"></i><b>ملفات</b></div>
        <input type="file" id="fileIn" style="display:none" onchange="handleFile(this)">
    </div>

    <div class="input-box">
        <button class="circle-btn" id="clipBtn"><i class="fas fa-paperclip"></i></button>
        <input type="text" id="userInput" placeholder="اكتب رسالة..." onkeypress="if(event.key === 'Enter') sendMsg()">
        <button class="circle-btn" id="micBtn" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
        <button class="circle-btn send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    let painting = false;

    const mainMenu = document.getElementById('mainMenu'), 
          shareSub = document.getElementById('shareSub'), 
          attachMenu = document.getElementById('attachMenu');

    // التحكم في القوائم
    document.getElementById('dotsBtn').onclick = (e) => { 
        e.stopPropagation(); 
        mainMenu.classList.toggle('active'); 
        shareSub.classList.remove('active'); 
        attachMenu.classList.remove('active');
    };

    document.getElementById('shareTrigger').onclick = (e) => { 
        e.stopPropagation(); 
        shareSub.classList.toggle('active'); 
    };

    document.getElementById('clipBtn').onclick = (e) => { 
        e.stopPropagation(); 
        attachMenu.classList.toggle('active'); 
        mainMenu.classList.remove('active');
        shareSub.classList.remove('active');
    };

    window.onclick = () => { 
        mainMenu.classList.remove('active'); 
        shareSub.classList.remove('active'); 
        attachMenu.classList.remove('active');
    };

    // وظائف الدردشة
    function sendMsg() {
        const i = document.getElementById('userInput');
        if(i.value.trim()){
            append(i.value, 'user');
            i.value='';
            setTimeout(() => append("تم استلام رسالتك بنجاح، كيف أساعدك؟", 'ai'), 800);
        }
    }

    function append(t, s) {
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.setAttribute('data-original', t);
        d.innerHTML = t;
        if(s === 'ai') {
            d.innerHTML += `<div class="tools"><span onclick="speak(this)">استماع</span><span onclick="translateMsg(this)">ترجمة</span><span onclick="resetMsg(this)" style="background:rgba(0,0,0,0.05); padding:0 4px; border-radius:4px; color:var(--text)">AB</span></div>`;
        }
        const b = document.getElementById('chatbox');
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }

    // PDF وصور
    function saveAsPDF() {
        showToast("جاري حفظ PDF...");
        const element = document.getElementById('chatbox');
        html2pdf().from(element).save('Cython_Chat.pdf');
    }

    function saveAsImage() {
        showToast("جاري حفظ الصورة...");
        html2canvas(document.getElementById('captureArea')).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Cython_Chat.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function copyAppLink() {
        navigator.clipboard.writeText(window.location.href).then(() => {
            showToast("تم نسخ الرابط بنجاح");
        });
    }

    // الرسم
    function start(e) { painting = true; draw(e); }
    function end() { painting = false; ctx.beginPath(); }
    function draw(e) {
        if(!painting) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.strokeStyle = document.getElementById('colorPicker').value;
        ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
    }
    canvas.addEventListener('mousedown', start); canvas.addEventListener('mouseup', end); canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
    canvas.addEventListener('touchend', end); canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

    function openDrawing() { document.getElementById('drawingPad').style.display='flex'; canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight; attachMenu.classList.remove('active'); }
    function closeDrawing() { document.getElementById('drawingPad').style.display='none'; }
    function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }
    function saveDrawing() { const url = canvas.toDataURL(); append(`<img src="${url}">`, 'user'); closeDrawing(); }

    // وظائف إضافية
    let isRec = false;
    function toggleMic() {
        isRec = !isRec;
        const btn = document.getElementById('micBtn');
        if(isRec) { btn.classList.add('mic-active'); showToast("جاري الاستماع..."); }
        else { btn.classList.remove('mic-active'); showToast("تم التوقف"); }
    }
    function translateMsg(b) { b.closest('.msg').childNodes[0].textContent = "I'm Cython AI, how can I help you today?"; }
    function resetMsg(b) { const m = b.closest('.msg'); m.childNodes[0].textContent = m.getAttribute('data-original'); }
    function speak(b) { const s = new SpeechSynthesisUtterance(b.closest('.msg').childNodes[0].textContent); s.lang = 'ar-SA'; window.speechSynthesis.speak(s); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
    function handleFile(i) { if(i.files[0]) { append(`📁 ملف مرفق: ${i.files[0].name}`, 'user'); attachMenu.classList.remove('active'); } }

    window.onload = function() {
        const incoming = localStorage.getItem('cython_incoming_chat');
        if (incoming) {
            JSON.parse(incoming).forEach((m, idx) => {
                setTimeout(() => append(`<img src="${m.content}">`, 'user'), idx * 500);
            });
            localStorage.removeItem('cython_incoming_chat');
        }
    };
</script>
</body>
</html>
