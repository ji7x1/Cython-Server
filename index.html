<!DOCTYPE html>
<script>
    // نظام الحفاظ على الثيم والتباين قبل التحميل (Zero Latency)
    (function() {
        const mode = localStorage.getItem('themeMode');
        const color = localStorage.getItem('themeColor');
        if (mode === 'dark') document.documentElement.classList.add('dark');
        if (color) document.documentElement.classList.add(color);
        const bg = mode === 'dark' ? '#050505' : '#f0f2f5';
        document.documentElement.style.backgroundColor = bg;
    })();
</script>

<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cython Grandmaster - Dynamic Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        :root { 
            --main: #4facfe; --bg: #f0f2f5; --app: #ffffff; --text: #1a1a1a; 
            --glass: rgba(255, 255, 255, 0.7); --border: rgba(0,0,0,0.06); --card: #ffffff;
        }
        
        html.dark { 
            --bg: #050505; --app: #0f0f0f; --text: #f1f5f9; 
            --glass: rgba(15, 15, 15, 0.75); --border: rgba(255,255,255,0.06); --card: #1c1c1e;
        }

        /* نظام الثيمات العشري */
        html.color-1 { --main: #4facfe; } html.color-2 { --main: #ff4757; }
        html.color-3 { --main: #2ecc71; } html.color-4 { --main: #a29bfe; }
        html.color-5 { --main: #f1c40f; } html.color-6 { --main: #e84393; }
        html.color-7 { --main: #00d2d3; } html.color-8 { --main: #54a0ff; }
        html.color-9 { --main: #ae8b70; } html.color-10 { --main: #34495e; }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; 
            user-select: none; caret-color: transparent !important;
        }

        body { background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; transition: 0.5s; }
        .phone { width: 100%; height: 100%; max-width: 500px; background: var(--app); display: flex; flex-direction: column; position: relative; overflow: hidden; }

        /* الأنميشن الاحترافي */
        .rocket-launch {
            position: fixed; font-size: 35px; color: var(--main); z-index: 9999;
            pointer-events: none; transition: 0.7s cubic-bezier(0.47, 0, 0.745, 0.715);
            filter: drop-shadow(0 0 10px var(--main));
        }

        .header { height: 90px; padding: 25px 25px 0; display: flex; justify-content: space-between; align-items: center; z-index: 2000; }
        .menu-icon { font-size: 26px; color: var(--main); cursor: pointer; transition: 0.3s; }
        .menu-icon:active { transform: scale(0.8); }

        /* سايد بار مطور */
        .sidebar { 
            position: absolute; top: 0; right: -100%; width: 85%; height: 100%; 
            background: var(--glass); backdrop-filter: blur(25px); 
            z-index: 4000; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); 
            padding: 60px 25px 40px; border-left: 1px solid var(--border); display: flex; flex-direction: column;
        }
        .sidebar.active { right: 0; }
        .side-item { display: flex; align-items: center; gap: 15px; padding: 15px; color: var(--text); font-weight: 700; cursor: pointer; border-radius: 18px; transition: 0.2s; }
        .side-item:active { background: var(--border); }
        .side-item i { color: var(--main); font-size: 18px; width: 25px; }

        /* دراور التطبيقات (Smart Grid) */
        .drawer {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: var(--glass); backdrop-filter: blur(45px);
            border-top: 1px solid var(--border); border-radius: 45px 45px 0 0;
            transition: 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 3000; padding: 20px 20px 50px; height: 160px;
        }
        .drawer.open { height: 75%; }
        .handle { width: 100%; display: flex; justify-content: center; padding: 10px 0 30px; cursor: pointer; }
        .handle-bar { width: 45px; height: 5px; background: var(--main); border-radius: 10px; opacity: 0.3; }

        .apps-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; 
            transition: 0.5s ease;
        }
        .drawer.open .apps-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }

        .app-card { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .icon-box { 
            width: 60px; height: 60px; background: var(--main); color: #fff; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; font-size: 22px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .drawer.open .icon-box { width: 85px; height: 85px; border-radius: 28px; font-size: 32px; }
        .app-card span { font-size: 11px; font-weight: 800; color: var(--text); text-align: center; }

        .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 120px; }
        .hero h1 { font-size: 60px; font-weight: 900; color: var(--main); letter-spacing: -3px; }

        #splash { position: absolute; inset: 0; background: var(--app); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        
        /* الثيمات */
        .theme-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 25px; }
        .dot { aspect-ratio: 1; border-radius: 10px; cursor: pointer; border: 2px solid transparent; }
    </style>
</head>
<body>

    <div class="phone" id="phoneBody">
        <audio id="popSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

        <div id="splash">
            <i class="fas fa-shuttle-space" style="font-size: 70px; color: var(--main);"></i>
            <h1 style="color:var(--main); margin-top:20px; font-weight:900;">CYTHON PRO</h1>
            <div style="position: absolute; bottom: 50px; font-size: 11px; font-weight: 800; color: var(--p); letter-spacing: 2px;">ULTRA-SMOOTH SYSTEM</div>
        </div>

        <div class="sidebar" id="sidebar">
            <div style="flex: 1; overflow-y: auto;">
                <h2 style="color:var(--text); font-weight: 900; margin-bottom: 20px;">المركز الذكي</h2>
                
                <p style="font-size: 12px; font-weight: 900; color: var(--main); margin-bottom: 10px;">تخصيص الثيم</p>
                <div class="theme-grid" id="themeGrid"></div>
                
                <div class="side-item" onclick="toggleD()"><i class="fas fa-circle-half-stroke"></i> مظهر النظام</div>
                <div class="side-item" onclick="exportBackup()"><i class="fas fa-cloud-arrow-down"></i> حفظ نسخة سحابية</div>
                <div class="side-item" onclick="document.getElementById('fileInput').click()"><i class="fas fa-cloud-arrow-up"></i> استعادة النسخة</div>
                <input type="file" id="fileInput" style="display:none" onchange="importBackup(event)">
                <hr style="opacity: 0.1; margin: 15px 0;">
                <div class="side-item" onclick="location.href='https://t.me/Cython'"><i class="fab fa-telegram"></i> مجتمع سايثون</div>
            </div>
            <button onclick="toggleMenu()" style="width: 100%; padding: 18px; background: var(--main); color: white; border: none; border-radius: 20px; font-weight: 900;">العودة</button>
        </div>

        <header class="header">
            <i class="fas fa-bars-staggered menu-icon" onclick="toggleMenu()"></i>
            <div onclick="handleAliIdentity(event)" id="userBtn" style="cursor:pointer;">
                <div id="userIconContainer"><i class="fas fa-user-circle" style="color:var(--main); font-size:32px;"></i></div>
            </div>
        </header>

        <main class="hero">
            <h1 id="brandName">CYTHON</h1>
            <div id="authArea" style="margin-top:20px;"></div>
        </main>

        <div class="drawer" id="drawer">
            <div class="handle" onclick="toggleDrawer()"><div class="handle-bar"></div></div>
            <div class="apps-grid">
                <div class="app-card" onclick="launchRocket(event, 'chat.html')"><div class="icon-box"><i class="fas fa-comment"></i></div><span>الدردشة</span></div>
                <div class="app-card" onclick="launchRocket(event, 'vault.html')"><div class="icon-box"><i class="fas fa-shield-halved"></i></div><span>الخزنة</span></div>
                <div class="app-card" onclick="launchRocket(event, 'games.html')"><div class="icon-box"><i class="fas fa-gamepad"></i></div><span>الألعاب</span></div>
                <div class="app-card" onclick="launchRocket(event, 'note.html')"><div class="icon-box"><i class="fas fa-feather"></i></div><span>الملاحظات</span></div>
                <div class="app-card" onclick="launchRocket(event, 'habits.html')"><div class="icon-box"><i class="fas fa-check-double"></i></div><span>المهام</span></div>
                <div class="app-card" onclick="launchRocket(event, 'alarm.html')"><div class="icon-box"><i class="fas fa-stopwatch"></i></div><span>المنبه</span></div>
                <div class="app-card" onclick="launchRocket(event, 'stats.html')"><div class="icon-box"><i class="fas fa-chart-pie"></i></div><span>الإحصائيات</span></div>
                <div class="app-card" onclick="launchRocket(event, 'camera.html')"><div class="icon-box"><i class="fas fa-camera-retro"></i></div><span>الكاميرا</span></div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            isLoggedIn: localStorage.getItem('isLoggedIn') === 'true',
            user: localStorage.getItem('username') || 'ضيف'
        };

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); }

        function handleAliIdentity(e) {
            launchRocket(e, state.isLoggedIn ? 'info.html' : 'signup.html');
        }

        function launchRocket(e, page) {
            const rocket = document.createElement('i');
            rocket.className = 'fas fa-rocket rocket-launch';
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            rocket.style.left = (x - 15) + 'px';
            rocket.style.top = (y - 15) + 'px';
            document.body.appendChild(rocket);

            document.getElementById('popSound').play().catch(()=>{});
            document.getElementById('phoneBody').classList.add('shake-screen');

            setTimeout(() => {
                rocket.style.transform = 'translateY(-110vh) scale(2) rotate(-10deg)';
                rocket.style.opacity = '0';
            }, 50);

            setTimeout(() => { location.href = page; }, 600);
        }

        // سحابة التزامن الذكية
        function exportBackup() {
            const data = { ...localStorage };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Backup_${state.user}.cython`;
            a.click();
            alert(`تم تصدير نسخة السحابة باسم ${state.user} ✅`);
        }

        function importBackup(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = JSON.parse(e.target.result);
                Object.keys(data).forEach(key => localStorage.setItem(key, data[key]));
                alert("تم استعادة كل البيانات بنجاح! سيتم التحديث الآن.");
                location.reload();
            };
            reader.readAsText(file);
        }

        // تهيئة النظام
        window.addEventListener('DOMContentLoaded', () => {
            // توليد نقاط الثيمات
            const colors = ['#4facfe','#ff4757','#2ecc71','#a29bfe','#f1c40f','#e84393','#00d2d3','#54a0ff','#ae8b70','#34495e'];
            const grid = document.getElementById('themeGrid');
            colors.forEach((c, i) => {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.background = c;
                dot.onclick = () => {
                    document.documentElement.className = '';
                    if(localStorage.getItem('themeMode')==='dark') document.documentElement.classList.add('dark');
                    document.documentElement.classList.add('color-' + (i+1));
                    localStorage.setItem('themeColor', 'color-' + (i+1));
                };
                grid.appendChild(dot);
            });

            // تحديث واجهة المستخدم بالاسم الديناميكي
            const authArea = document.getElementById('authArea');
            const userIcon = document.getElementById('userIconContainer');
            
            if (state.isLoggedIn) {
                userIcon.innerHTML = `<img src="https://ui-avatars.com/api/?name=${state.user}&background=random&color=fff" style="width:38px; height:38px; border-radius:12px; border:2px solid var(--main); object-fit: cover;">`;
                authArea.innerHTML = `<div style="color:var(--text); font-size:22px; font-weight:900;">هلا، <span style="color:var(--main)">${state.user}</span></div>`;
            } else {
                authArea.innerHTML = `<button onclick="location.href='signup.html'" style="background:var(--main); color:#fff; padding:15px 50px; border-radius:20px; border:none; font-weight:900;">انطلق الآن</button>`;
            }

            // إخفاء السبلاش
            setTimeout(() => {
                const s = document.getElementById('splash');
                s.style.opacity = '0';
                setTimeout(() => s.style.display = 'none', 800);
            }, 2000);
        });

        function toggleD() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('themeMode', isDark ? 'dark' : 'light');
            document.documentElement.style.backgroundColor = isDark ? '#050505' : '#f0f2f5';
        }
    </script>
</body>
</html>
